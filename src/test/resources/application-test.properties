# ── Test Profile — uses H2 in-memory DB (no MySQL needed for tests) ────────

# Override datasource with H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - create-drop for tests (fresh schema each test run)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Schema init — still run schema.sql to create tables
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# Disable HikariCP config from AppConfig — Spring Boot auto-configures H2
spring.autoconfigure.exclude=

# Logging
logging.level.com.slice=DEBUG
