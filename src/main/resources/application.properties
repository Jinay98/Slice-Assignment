# ── Application ───────────────────────────────────────────────────────────
spring.application.name=slice-interview-prep
server.port=8080

# ── MySQL DataSource ──────────────────────────────────────────────────────
# createDatabaseIfNotExist=true : auto-creates DB if it doesn't exist
# useSSL=false                  : disables SSL for local dev
# serverTimezone=UTC            : explicit timezone for consistency
spring.datasource.url=jdbc:mysql://localhost:3306/slice_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP Connection Pool (Singleton) ─────────────────────────────────
# Spring Boot auto-configures HikariCP — just set pool parameters here.
spring.datasource.hikari.pool-name=SliceHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────
# validate : checks schema against entities — uses schema.sql as source of truth
# update   : auto-alters schema (useful in early dev, risky in prod — use validate in prod)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Schema Initialization ─────────────────────────────────────────────────
# always  : runs schema.sql on every startup
# embedded: only for in-memory DBs (H2 etc.)
# never   : disables schema init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
# Must defer datasource init so JPA validates AFTER schema.sql runs
spring.jpa.defer-datasource-initialization=true

# ── Jackson ───────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.slice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
